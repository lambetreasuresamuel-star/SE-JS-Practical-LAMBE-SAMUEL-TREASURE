<!DOCTYPE html>
<html>
<head>
    <title>Grade Evaluator</title>
</head>
<body>

    <script>
        
function getGrade(score) {
    if (score >= 80) {
        return "A";
    } else if (score >= 70) {
        return "B";
    } else if (score >= 60) {
        return "C";
    } else if (score >= 50) {
        return "D";
    } else {
        return "F";
    }
}

let score = prompt("Enter your score:");
let grade = getGrade(score);

console.log("Grade: " + grade);

    </script>
</body>
</html>

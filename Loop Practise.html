<!DOCTYPE html>
<html>
<body>
<script>
  // FOR LOOP to print numbers and even numbers
let sum = 0;

for (let i = 1; i <= 20; i++) {
    console.log(i);

    sum = sum + i;
}
for (let i = 1; i <= 20; i++) {
  
    if (i % 2 === 0) {
        console.log("Even:", i);
    }
}

// WHILE LOOP → display the sum
let finished = true;

while (finished) {
    console.log("Sum:", sum);
    finished = false;
}
</script>
</body>
</html>
